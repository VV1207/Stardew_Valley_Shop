<script>
// ============== 全局状态 ==============
let itemsData = [];
let currentUser = null;
let cachedOrders = [];   // 后端订单数据
let cachedReviews = {};  // 后端评价数据 key=order_id

// ============== 初始化 ==============
async function init() {
    // 通过 API 检查登录
    try {
        const res = await fetch('api/auth.php?action=me');
        const data = await res.json();
        if (!data.success || !data.data || data.data.loggedIn === false) {
            window.location.href = 'login.php';
            return;
        }
        currentUser = data.data.user;
        document.getElementById('profileUsername').textContent = currentUser.username;
        document.getElementById('profileAddress').textContent = `📧 ${currentUser.email || '未填写'}`;
        document.getElementById('profileEmail').textContent = `🕐 注册时间: ${new Date(currentUser.created_at).toLocaleString('zh-CN')}`;
    } catch (e) {
        console.error('登录检查失败:', e);
        window.location.href = 'login.php';
        return;
    }

    // 加载物品数据（确保 items_data.js 已加载）
    function loadItemsData() {
        if (typeof window.ITEMS_DATA !== 'undefined' && window.ITEMS_DATA.length > 0) {
            itemsData = window.ITEMS_DATA;
            return true;
        }
        return false;
    }

    // 如果 itemsData 还没加载，等待一下
    if (!loadItemsData()) {
        await new Promise(resolve => {
            const check = setInterval(() => {
                if (loadItemsData()) { clearInterval(check); resolve(); }
            }, 50);
            setTimeout(() => { clearInterval(check); resolve(); }, 3000);
        });
    }

    initTabs();
    // 并行加载
    await Promise.all([renderFavorites(), renderOrders(), renderFeedback()]);
}

// ============== 标签切换 ==============
function initTabs() {
    document.querySelectorAll('.profile-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.profile-section').forEach(s => s.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('section' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.add('active');
        });
    });
}

function findItem(itemId) {
    // 同时尝试字符串和整数比较，因为数据库中可能是字符串ID
    const numId = parseInt(itemId, 10);
    return itemsData.find(i => i.id === itemId || i.id === numId || String(i.id) === String(itemId));
}

// 获取物品图片和名称的辅助函数
function getItemDisplayInfo(item) {
    const itemData = findItem(item.item_id);
    let imgHtml = '';
    let displayName = item.item_name;

    if (itemData) {
        // 使用 itemsData 中的正确名称（数据库中可能存的是ID数字）
        displayName = itemData.name || item.item_name;
        if (itemData.image) {
            imgHtml = `<img src="${itemData.image}" alt="${displayName}" class="item-display-img" onerror="this.style.display='none'">`;
        }
    }

    // 如果名称看起来是纯数字（旧数据bug），尝试用ID查找
    if (/^\d+$/.test(displayName) && itemData) {
        displayName = itemData.name;
    }

    if (!imgHtml) {
        imgHtml = `<span class="item-display-placeholder">📦</span>`;
    }

    if (!displayName || /^\d+$/.test(displayName)) {
        displayName = '物品#' + item.item_id;
    }

    return { imgHtml, displayName };
}

// ============== 收藏（API） ==============
async function renderFavorites() {
    const grid = document.getElementById('favGrid');
    let favIds = [];
    try {
        const res = await fetch('api/favorites.php');
        const data = await res.json();
        if (data.success && data.data && data.data.favorites) {
            favIds = data.data.favorites;
        }
    } catch (e) { console.error('加载收藏失败:', e); }

    if (favIds.length === 0) {
        grid.innerHTML = '<div class="fav-empty">💔 还没有收藏任何物品<br><small>在商店首页点击物品上的 🤍 按钮即可收藏</small></div>';
        return;
    }

    let html = '';
    favIds.forEach(id => {
        const item = findItem(id);
        if (!item) {
            html += `<div class="fav-item"><div class="fav-name">未知物品 (ID: ${id})</div></div>`;
            return;
        }
        html += `
            <div class="fav-item">
                ${item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">` : '<div class="fav-placeholder">📦</div>'}
                <div class="fav-name">${item.name}</div>
                <div class="fav-category">${item.category || ''}</div>
                <div class="fav-price"><img src="images/Gold.png" alt="G" class="gold-icon"> ${item.price || '?'} G</div>
            </div>
        `;
    });
    grid.innerHTML = html;
}

// ============== 订单 + 评价（API） ==============
async function renderOrders() {
    const container = document.getElementById('ordersList');

    // 1. 加载订单
    try {
        const res = await fetch('api/orders.php');
        const data = await res.json();
        if (data.success && data.data && data.data.orders) {
            cachedOrders = data.data.orders;
        }
    } catch (e) { console.error('加载订单失败:', e); }

    // 2. 加载评价
    try {
        const res = await fetch('api/reviews.php');
        const data = await res.json();
        if (data.success && data.data && data.data.reviews) {
            cachedReviews = {};
            data.data.reviews.forEach(r => { cachedReviews[r.order_id] = r; });
        }
    } catch (e) { console.error('加载评价失败:', e); }

    if (cachedOrders.length === 0) {
        container.innerHTML = '<div class="fav-empty">🛍️ 还没有历史订单<br><small>去商店选购商品并结账吧！</small></div>';
        return;
    }

    renderOrdersList(cachedOrders);
}

function renderOrdersList(orders) {
    const container = document.getElementById('ordersList');
    const keyword = (document.getElementById('orderSearchInput').value || '').trim().toLowerCase();
    let html = '';
    let matchCount = 0;

    for (const order of orders) {
        // 搜索过滤
        if (keyword) {
            const items = order.items || [];
            if (!items.some(item => (item.item_name || '').toLowerCase().includes(keyword))) continue;
        }
        matchCount++;

        const review = cachedReviews[order.id] || null;
        const dateStr = new Date(order.created_at).toLocaleString('zh-CN');
        const statusMap = { pending: '待处理', confirmed: '已确认', delivered: '已送达' };
        const statusClass = order.status === 'confirmed' ? 'status-confirmed' : order.status === 'pending' ? 'status-pending' : 'status-delivered';
        const deliveryStr = order.delivery_type === 'delivery' ? `🚚 ${order.delivery_villager || ''}` : '🏪 自提';

        let itemsHtml = '';
        const items = order.items || [];
        items.forEach(item => {
            const qualStr = item.quality ? ` (${item.quality})` : '';
            const display = getItemDisplayInfo(item);
            let displayName = display.displayName;
            if (keyword) {
                const lowerName = displayName.toLowerCase();
                const idx = lowerName.indexOf(keyword);
                if (idx >= 0) {
                    displayName = displayName.substring(0, idx) + '<span class="order-match-highlight">' + displayName.substring(idx, idx + keyword.length) + '</span>' + displayName.substring(idx + keyword.length);
                }
            }
            const unitPrice = item.price;
            const subtotal = unitPrice * item.quantity;
            itemsHtml += `<div class="order-item-row"><span>${display.imgHtml}${displayName}${qualStr} (${unitPrice} G × ${item.quantity})</span><span><img src="images/Gold.png" alt="G" class="gold-icon"> ${subtotal} G</span></div>`;
        });

        // 评价区域
        let reviewHtml = '';
        if (review) {
            const stars = (n) => { let s = ''; for (let j = 0; j < 5; j++) s += j < n ? '⭐' : '<span class="empty">☆</span>'; return s; };
            reviewHtml = `
                <div class="existing-review">
                    <div class="er-header">
                        <span><strong>你的评价</strong></span>
                        <span class="er-date">${new Date(review.created_at).toLocaleString('zh-CN')}</span>
                    </div>
                    <div class="review-ratings-display">
                        <span>📦 收货服务: ${stars(review.delivery_rating)}</span>
                        <span>🏷️ 商品品质: ${stars(review.quality_rating)}</span>
                        <span>⭐ 综合评分: ${stars(review.overall_rating)}</span>
                    </div>
                    ${review.comment ? `<div class="er-text">💬 "${review.comment}"</div>` : ''}
                    <button class="review-submit-btn edit-review-btn" onclick="editReview(${order.id})">✏️ 修改评价</button>
                </div>
            `;
        } else {
            reviewHtml = `
                <div class="review-section" id="reviewForm_${order.id}">
                    <h4>📝 评价此订单</h4>
                    <div class="review-row">
                        <div class="rating-group">
                            <label>📦 收货服务</label>
                            <div class="star-rating"><input type="radio" name="delivery_${order.id}" id="d_${order.id}_5" value="5"><label for="d_${order.id}_5">★</label><input type="radio" name="delivery_${order.id}" id="d_${order.id}_4" value="4"><label for="d_${order.id}_4">★</label><input type="radio" name="delivery_${order.id}" id="d_${order.id}_3" value="3"><label for="d_${order.id}_3">★</label><input type="radio" name="delivery_${order.id}" id="d_${order.id}_2" value="2"><label for="d_${order.id}_2">★</label><input type="radio" name="delivery_${order.id}" id="d_${order.id}_1" value="1"><label for="d_${order.id}_1">★</label></div>
                        </div>
                        <div class="rating-group">
                            <label>🏷️ 商品品质</label>
                            <div class="star-rating"><input type="radio" name="quality_${order.id}" id="q_${order.id}_5" value="5"><label for="q_${order.id}_5">★</label><input type="radio" name="quality_${order.id}" id="q_${order.id}_4" value="4"><label for="q_${order.id}_4">★</label><input type="radio" name="quality_${order.id}" id="q_${order.id}_3" value="3"><label for="q_${order.id}_3">★</label><input type="radio" name="quality_${order.id}" id="q_${order.id}_2" value="2"><label for="q_${order.id}_2">★</label><input type="radio" name="quality_${order.id}" id="q_${order.id}_1" value="1"><label for="q_${order.id}_1">★</label></div>
                        </div>
                        <div class="rating-group">
                            <label>⭐ 综合评分</label>
                            <div class="star-rating"><input type="radio" name="overall_${order.id}" id="o_${order.id}_5" value="5"><label for="o_${order.id}_5">★</label><input type="radio" name="overall_${order.id}" id="o_${order.id}_4" value="4"><label for="o_${order.id}_4">★</label><input type="radio" name="overall_${order.id}" id="o_${order.id}_3" value="3"><label for="o_${order.id}_3">★</label><input type="radio" name="overall_${order.id}" id="o_${order.id}_2" value="2"><label for="o_${order.id}_2">★</label><input type="radio" name="overall_${order.id}" id="o_${order.id}_1" value="1"><label for="o_${order.id}_1">★</label></div>
                        </div>
                    </div>
                    <textarea class="review-textarea" id="reviewComment_${order.id}" placeholder="写下你的购物体验（可选）..."></textarea>
                    <button class="review-submit-btn" onclick="submitReview(${order.id})">✅ 提交评价</button>
                </div>
            `;
        }

        html += `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">📋 ${order.order_number}</span>
                    <span class="order-status ${statusClass}">${statusMap[order.status] || order.status}</span>
                    <span class="order-delivery">${deliveryStr}</span>
                    <span class="order-date">${dateStr}</span>
                    <span class="order-total"><img src="images/Gold.png" alt="G" class="gold-icon"> ${order.total_price} G</span>
                </div>
                <div class="order-items">${itemsHtml}</div>
                ${reviewHtml}
            </div>
        `;
    }

    if (matchCount === 0 && keyword) {
        container.innerHTML = '<div class="order-search-empty">🔍 没有找到包含「' + keyword + '」的订单</div>';
    } else if (keyword) {
        container.innerHTML = '<div class="order-search-empty search-result-info">📋 找到 ' + matchCount + ' 条包含「' + keyword + '」的订单</div>' + html;
    } else {
        container.innerHTML = html;
    }
}

// 提交评价（API）
async function submitReview(orderId) {
    const deliveryEl = document.querySelector(`input[name="delivery_${orderId}"]:checked`);
    const qualityEl = document.querySelector(`input[name="quality_${orderId}"]:checked`);
    const overallEl = document.querySelector(`input[name="overall_${orderId}"]:checked`);

    if (!deliveryEl || !qualityEl || !overallEl) {
        alert('请完成所有星级评分后再提交！');
        return;
    }

    const payload = {
        order_id: orderId,
        delivery_rating: parseInt(deliveryEl.value),
        quality_rating: parseInt(qualityEl.value),
        overall_rating: parseInt(overallEl.value),
        comment: (document.getElementById('reviewComment_' + orderId)?.value || '').trim()
    };

    try {
        const res = await fetch('api/reviews.php?action=create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
            // 更新缓存
            cachedReviews[orderId] = {
                order_id: orderId,
                delivery_rating: payload.delivery_rating,
                quality_rating: payload.quality_rating,
                overall_rating: payload.overall_rating,
                comment: payload.comment,
                created_at: new Date().toISOString()
            };
            renderOrdersList(cachedOrders);
            alert('✅ 评价已提交，感谢你的反馈！');
        } else {
            alert('❌ ' + (data.error || '提交失败'));
        }
    } catch (e) {
        console.error('提交评价失败:', e);
        alert('❌ 网络错误，请重试');
    }
}

// 修改评价：先显示旧评分表单（预填值），提交时走 update
async function editReview(orderId) {
    if (!confirm('确定要修改这条评价吗？')) return;

    // 先从后端获取当前评价
    let review = cachedReviews[orderId];
    if (!review) {
        // 如果缓存没有，尝试从后端获取
        try {
            const res = await fetch(`api/reviews.php?order_id=${orderId}`);
            const data = await res.json();
            if (data.success && data.data && data.data.review) {
                review = data.data.review;
                cachedReviews[orderId] = review;
            }
        } catch (e) {}
    }
    if (!review) return;

    // 从缓存中移除，重新渲染让表单重新出现
    delete cachedReviews[orderId];

    // 找到对应订单数据
    const order = cachedOrders.find(o => o.id === orderId);
    if (!order) return;

    // 重新渲染订单列表，此时该订单没有评价，会显示表单
    renderOrdersList(cachedOrders);

    // 延迟填入之前的评分值
    setTimeout(() => {
        const form = document.getElementById('reviewForm_' + orderId);
        if (!form) return;

        // 填入旧评分
        const dEl = form.querySelector(`input[name="delivery_${orderId}"][value="${review.delivery_rating}"]`);
        const qEl = form.querySelector(`input[name="quality_${orderId}"][value="${review.quality_rating}"]`);
        const oEl = form.querySelector(`input[name="overall_${orderId}"][value="${review.overall_rating}"]`);
        if (dEl) dEl.checked = true;
        if (qEl) qEl.checked = true;
        if (oEl) oEl.checked = true;

        const commentEl = document.getElementById('reviewComment_' + orderId);
        if (commentEl) commentEl.value = review.comment || '';

        // 修改提交按钮为"更新评价"
        const submitBtn = form.querySelector('.review-submit-btn');
        if (submitBtn) {
            submitBtn.textContent = '✅ 更新评价';
            submitBtn.onclick = () => submitReviewUpdate(orderId);
        }

        form.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
}

// 更新评价（API）
async function submitReviewUpdate(orderId) {
    const deliveryEl = document.querySelector(`input[name="delivery_${orderId}"]:checked`);
    const qualityEl = document.querySelector(`input[name="quality_${orderId}"]:checked`);
    const overallEl = document.querySelector(`input[name="overall_${orderId}"]:checked`);

    if (!deliveryEl || !qualityEl || !overallEl) {
        alert('请完成所有星级评分后再提交！');
        return;
    }

    const payload = {
        order_id: orderId,
        delivery_rating: parseInt(deliveryEl.value),
        quality_rating: parseInt(qualityEl.value),
        overall_rating: parseInt(overallEl.value),
        comment: (document.getElementById('reviewComment_' + orderId)?.value || '').trim()
    };

    try {
        const res = await fetch('api/reviews.php?action=update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
            cachedReviews[orderId] = { ...payload, created_at: new Date().toISOString() };
            renderOrdersList(cachedOrders);
            alert('✅ 评价已更新！');
        } else {
            alert('❌ ' + (data.error || '更新失败'));
        }
    } catch (e) {
        console.error('更新评价失败:', e);
        alert('❌ 网络错误，请重试');
    }
}

// ============== 用户反馈（API） ==============
const feedbackTypeIcons = { '建议': '💡', '问题': '🐛', '体验': '🌟', '其他': '📝' };

async function renderFeedback() {
    const container = document.getElementById('feedbackList');
    let feedbacks = [];
    try {
        const res = await fetch('api/feedback.php');
        const data = await res.json();
        if (data.success && data.data && data.data.feedbacks) {
            feedbacks = data.data.feedbacks;
        }
    } catch (e) { console.error('加载反馈失败:', e); }

    if (feedbacks.length === 0) {
        container.innerHTML = '<div class="fav-empty">📭 暂无反馈记录<br><small>成为第一个提交反馈的村民吧！</small></div>';
        return;
    }

    let html = `<div class="feedback-list-header">
        <h3>📜 社区反馈墙 <span class="feedback-count">共 ${feedbacks.length} 条</span></h3>
        <p class="feedback-list-subtitle">来自鹈鹕镇各位村民的心声，你的每一条反馈都很珍贵 🌻</p>
    </div>`;
    feedbacks.forEach(fb => {
        const icon = feedbackTypeIcons[fb.type] || '📝';
        const selfBadge = fb.is_self ? '<span class="feedback-self-badge">我</span>' : '';
        const authorClass = fb.is_self ? 'feedback-author-self' : '';
        html += `
            <div class="feedback-item${fb.is_self ? ' feedback-item-self' : ''}">
                <div class="fb-header">
                    <div class="fb-header-left">
                        <span class="feedback-type-tag">${icon} ${fb.type}</span>
                        <span class="feedback-author ${authorClass}">👤 ${fb.username}${selfBadge}</span>
                    </div>
                    <span class="fb-date">${new Date(fb.created_at).toLocaleString('zh-CN')}</span>
                </div>
                <div class="fb-content">${fb.content}</div>
            </div>
        `;
    });
    container.innerHTML = html;
}

async function submitFeedback() {
    const type = document.getElementById('feedbackType').value;
    const content = document.getElementById('feedbackContent').value.trim();

    if (!content) {
        alert('请填写反馈内容！');
        return;
    }

    try {
        const res = await fetch('api/feedback.php?action=create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, content })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('feedbackContent').value = '';
            await renderFeedback();
            alert('✅ 感谢你的反馈！我们会认真考虑你的建议 🌻');
        } else {
            alert('❌ ' + (data.error || '提交失败'));
        }
    } catch (e) {
        console.error('提交反馈失败:', e);
        alert('❌ 网络错误，请重试');
    }
}

// ============== 用户栏（API） ==============
async function initUserBar() {
    const bar = document.getElementById('userBar');
    try {
        const res = await fetch('api/auth.php?action=me');
        const data = await res.json();
        if (data.success && data.data && data.data.loggedIn !== false) {
            const user = data.data.user;
            bar.innerHTML = `
                <div class="user-info" id="userInfoDropdown">
                    <div class="user-avatar" id="userAvatarBtn">👤 ${user.username}</div>
                    <div class="user-dropdown">
                        <h4>📋 登录信息</h4>
                        <p><strong>👤 用户名:</strong> ${user.username}</p>
                        <p><strong>📧 邮箱:</strong> ${user.email || '未填写'}</p>
                        <p><strong>🕐 注册时间:</strong> ${new Date(user.created_at).toLocaleString('zh-CN')}</p>
                        <a href="index.html" class="profile-link">🏠 返回商店</a>
                        <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
                    </div>
                </div>
            `;
            return;
        }
    } catch (e) { console.error('获取用户信息失败:', e); }
    bar.innerHTML = `<a href="login.php" class="login-link">🔑 登录</a>`;
}

async function logout() {
    if (confirm('确定要退出登录吗？')) {
        try { await fetch('api/auth.php?action=logout', { method: 'POST' }); } catch (e) {}
        window.location.href = 'login.php';
    }
}

// ============== 订单搜索 ==============
function initOrderSearch() {
    const searchInput = document.getElementById('orderSearchInput');
    if (!searchInput) return;
    let debounceTimer = null;
    searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            renderOrdersList(cachedOrders);
        }, 200);
    });
}

// ============== 启动 ==============
document.addEventListener('DOMContentLoaded', () => {
    init();
    initUserBar();
    initOrderSearch();
});
</script>
