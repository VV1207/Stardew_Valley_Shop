<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星露谷 · 用户登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #eef5ea;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #2c2b28;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .login-container {
            background: white;
            max-width: 460px;
            width: 100%;
            border-radius: 36px;
            padding: 36px 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e9e0d0;
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #3d6830, #8bba6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-header p {
            color: #6b5e4a;
            margin-top: 6px;
            font-size: 0.9rem;
        }
        .login-header .avatar {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a3f2c;
            margin-bottom: 6px;
        }
        .form-group label .required {
            color: #b5573a;
            margin-left: 2px;
        }
        .form-group label .hint {
            font-weight: 400;
            color: #9a8a7a;
            font-size: 0.78rem;
            margin-left: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 16px;
            border: 2px solid #dcd0bc;
            border-radius: 40px;
            font-size: 0.9rem;
            background: #faf8f0;
            outline: none;
            transition: border-color 0.2s;
            color: #2c2b28;
        }
        .form-group input:focus {
            border-color: #88aa66;
        }
        .form-group input::placeholder {
            color: #b9ab92;
        }
        .form-group .error-msg {
            color: #b5573a;
            font-size: 0.78rem;
            margin-top: 4px;
            display: none;
        }
        .form-group.error input {
            border-color: #b5573a;
        }
        .form-group.error .error-msg {
            display: block;
        }

        .submit-btn {
            width: 100%;
            background: #578b34;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            background: #3f6a24;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .back-link a {
            color: #578b34;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #b9ab92;
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="avatar">🌾</div>
            <h1>欢迎来到星露谷</h1>
            <p>请填写你的个人信息以开始购物之旅</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group" id="nameGroup">
                <label>👤 用户名 <span class="required">*</span></label>
                <input type="text" id="username" placeholder="请输入你的名字" maxlength="20" autocomplete="off">
                <div class="error-msg">请输入用户名</div>
            </div>

            <div class="form-group" id="addressGroup">
                <label>🏠 住址 <span class="hint">（选填，默认鹈鹕镇事务中心）</span></label>
                <input type="text" id="address" placeholder="鹈鹕镇事务中心" maxlength="50" autocomplete="off">
            </div>

            <div class="form-group" id="emailGroup">
                <label>📧 邮箱 <span class="required">*</span></label>
                <input type="email" id="email" placeholder="example@email.com" maxlength="50" autocomplete="off">
                <div class="error-msg">请输入正确的邮箱地址</div>
            </div>

            <button type="submit" class="submit-btn">🌻 确认登录</button>
        </form>

        <div class="back-link">
            <a href="index.html">← 返回商店首页</a>
        </div>
    </div>

    <footer>
        ⭐ 数据来源: 星露谷中文维基百科 · 图片版权归 ConcernedApe 所有 ⭐<br>
        网页制作：陈薇羽 · 联系方式：1152629204@qq.com
    </footer>

    <script>
        // 如果已登录，跳转回首页
        const existingUser = localStorage.getItem('stardew_user');
        if (existingUser) {
            window.location.href = 'index.html';
        }

        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const addressInput = document.getElementById('address');
        const emailInput = document.getElementById('email');

        // 验证邮箱格式
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(groupId, show) {
            var group = document.getElementById(groupId);
            if (show) {
                group.classList.add('error');
            } else {
                group.classList.remove('error');
            }
        }

        // 实时清除错误状态
        usernameInput.addEventListener('input', function() { showError('nameGroup', false); });
        emailInput.addEventListener('input', function() {
            if (isValidEmail(this.value.trim())) {
                showError('emailGroup', false);
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var valid = true;

            // 验证用户名
            var username = usernameInput.value.trim();
            if (!username) {
                showError('nameGroup', true);
                valid = false;
            }

            // 验证邮箱
            var email = emailInput.value.trim();
            if (!email || !isValidEmail(email)) {
                showError('emailGroup', true);
                valid = false;
            }

            if (!valid) return;

            // 住址默认值
            var address = addressInput.value.trim() || '鹈鹕镇事务中心';

            // 保存到 localStorage
            var userData = {
                username: username,
                address: address,
                email: email,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('stardew_user', JSON.stringify(userData));

            // 跳转回首页
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
